# Personal machine configuration — packages, dotfile symlinks, macOS
# settings, login agents. Standalone: with mise installed and this file
# symlinked to ~/.config/mise/config.toml, `mise bootstrap --yes` applies
# everything (see README.md).
#
# On a Clipboard machine, clipboard-bootstrap merges the company layer
# (~/dev/cbh-core/bootstrap/mise.toml) into the same run. Ownership is
# disjoint so the layers never conflict: work-standard packages (git, gh, jq,
# awscli, colima, docker, docker-compose, rtk, pmg, 1password*) live there
# and are NOT repeated here.

[tools]
node = "lts"

[settings]
idiomatic_version_file_enable_tools = ["node"]

[bootstrap.brew.taps]
"datadog-labs/pack" = "https://github.com/datadog-labs/homebrew-pack.git"
"eugene1g/safehouse" = "https://github.com/eugene1g/homebrew-safehouse.git"
"hashicorp/tap" = "https://github.com/hashicorp/homebrew-tap.git"
"knocklabs/tap" = "https://github.com/knocklabs/homebrew-tap.git"
"sourcegraph/src-cli" = "https://github.com/sourcegraph/homebrew-src-cli.git"

[bootstrap.packages]
"brew:agent-browser" = "latest"
"brew:coreutils" = "latest"
"brew:datadog-labs/pack/pup" = "latest"
"brew:eugene1g/safehouse/agent-safehouse" = "latest"
"brew:eza" = "latest"
"brew:fzf" = "latest"
"brew:git-delta" = "latest"
"brew:gnupg" = "latest"
"brew:googleworkspace-cli" = "latest"
"brew:hashicorp/tap/terraform" = "latest"
"brew:helix" = "latest"
"brew:knocklabs/tap/knock" = "latest"
"brew:ldcli" = "latest"
"brew:mole" = "latest"
"brew:pinentry-mac" = "latest"
"brew:ripgrep" = "latest"
"brew:shellcheck" = "latest"
"brew:sourcegraph/src-cli/src-cli" = "latest"
"brew:sqlite" = "latest"
"brew:starship" = "latest"
"brew:terraform-docs" = "latest"
"brew:tmux" = "latest"
"brew:todo-txt" = "latest"
"brew:typescript-language-server" = "latest"
"brew:vhs" = "latest"
"brew:watch" = "latest"
"brew:watchman" = "latest"
"brew:webp" = "latest"
"brew:zoxide" = "latest"
# Not manageable by mise's brew backend — install manually (or via real
# Homebrew if you install it):
#   backblaze       cask uses an `installer` artifact mise rejects
#   sbx             docker/tap doesn't publish the cask API metadata mise needs
#   cotypist        not in the App Store or Homebrew (direct download)
#   aws-vpn-client  cask exists but untested under mise; installed via IT
#   little-snitch   cask exists but needs system-extension approval anyway
"brew-cask:cmux" = "latest"
"brew-cask:codexbar" = "latest"
"brew-cask:ddpm" = "latest"
"brew-cask:devutils" = "latest"
"brew-cask:font-fira-code-nerd-font" = "latest"
"brew-cask:google-chrome" = "latest"
"brew-cask:kap" = "latest"
"brew-cask:loom" = "latest"
"brew-cask:obsidian" = "latest"
"brew-cask:raycast" = "latest"
"brew-cask:signal" = "latest"
"brew-cask:slack" = "latest"
"brew-cask:slack-cli" = "latest"
"brew-cask:superwhisper" = "latest"
"brew-cask:zed" = "latest"
"brew-cask:zoom" = "latest"
# App Store apps via the mas backend; requires the mas CLI (below) and being
# signed into the App Store. If the first run installs mas and skips these,
# re-running converges.
"brew:mas" = "latest"
"mas:937984704" = "latest" # Amphetamine
"mas:1464122853" = "latest" # NextDNS

[bootstrap.repos]
"~/dev/trs/dotfiles" = { url = "https://github.com/therockstorm/dotfiles.git" }

# Symlinked from this repo into $HOME (mode defaults to symlink). The mise
# config itself is seeded manually first — see README.md. If a real file
# already exists at a target (e.g. a ~/.zshrc created before this runs),
# apply with `mise bootstrap --yes --force-dotfiles` to replace it.
[dotfiles]
"~/.config/mise/config.toml" = { source = "~/dev/trs/dotfiles/.config/mise/config.toml" }
"~/.config/starship.toml" = { source = "~/dev/trs/dotfiles/.config/starship.toml" }
"~/.gnupg/gpg-agent.conf" = { source = "~/dev/trs/dotfiles/.gnupg/gpg-agent.conf" }
"~/.ssh/config" = { source = "~/dev/trs/dotfiles/.ssh/config" }
"~/.gitconfig" = { source = "~/dev/trs/dotfiles/.gitconfig" }
"~/.zshrc" = { source = "~/dev/trs/dotfiles/.zshrc" }
"~/source" = { source = "~/dev/trs/dotfiles/source" }
# Agent/editor config. Tools that rewrite files atomically (Claude Code and
# Zed saving settings) replace the symlink with a real file; `mise bootstrap
# status` shows the drift — re-link with `mise bootstrap --yes
# --force-dotfiles` after reconciling.
#
# NOT tracked (public repo):
#   secrets: ~/.claude/.credentials.json, ~/.config/gh/hosts.yml,
#     ~/.codex/auth.json, ~/.config/groundtruth/ (auth only),
#     ~/.config/groundcrew/op.env (op:// vault refs), ~/.dogrc
#   ~/.codex entirely: config.toml and rules/ are machine-appended state
#     (repo trust list, command-approval history) that would republish
#     internal paths and commands on every commit. Re-set the three real
#     preferences on a new machine: model, model_reasoning_effort,
#     personality.
#   work context: ~/.claude/hooks/ and ~/.config/groundcrew/ reference
#     internal Clipboard repos — recreate by hand on work machines. Note
#     settings.json's hooks section points at ~/.claude/hooks scripts.
"~/.claude/CLAUDE.md" = { source = "~/dev/trs/dotfiles/.claude/CLAUDE.md" }
"~/.claude/settings.json" = { source = "~/dev/trs/dotfiles/.claude/settings.json" }
"~/.claude/statusline.sh" = { source = "~/dev/trs/dotfiles/.claude/statusline.sh" }
"~/.claude/docs" = { source = "~/dev/trs/dotfiles/.claude/docs" }
"~/.config/zed/settings.json" = { source = "~/dev/trs/dotfiles/.config/zed/settings.json" }
"~/.config/zed/keymap.json" = { source = "~/dev/trs/dotfiles/.config/zed/keymap.json" }
"~/.config/helix/config.toml" = { source = "~/dev/trs/dotfiles/.config/helix/config.toml" }
"~/.config/helix/languages.toml" = { source = "~/dev/trs/dotfiles/.config/helix/languages.toml" }
"~/.config/gh/config.yml" = { source = "~/dev/trs/dotfiles/.config/gh/config.yml" }

[bootstrap.macos.dock]
autohide = true
tilesize = 32
show_recents = false

[bootstrap.macos.finder]
preferred_view_style = "list"

[bootstrap.macos.defaults.NSGlobalDomain]
_HIHideMenuBar = true
"com.apple.mouse.scaling" = 3.0
"com.apple.trackpad.scaling" = 3.0
AppleShowAllExtensions = true
AppleKeyboardUIMode = 2
NSAutomaticPeriodSubstitutionEnabled = false

[bootstrap.macos.defaults."com.apple.finder"]
NewWindowTarget = "PfHm"

[bootstrap.macos.defaults."com.apple.dock"]
wvous-br-corner = 1
launchanim = false
show-process-indicators = false

[bootstrap.macos.defaults."com.apple.screencapture"]
location = "/Users/rocky/Desktop/Screenshots"

# Caps Lock → Escape at login (hidutil mappings don't survive reboot).
[bootstrap.macos.launchd.agents.caps-to-escape]
program = "~/dev/trs/dotfiles/bin/caps-to-escape"
run_at_load = true

# mise runs this task as the final step of `mise bootstrap`. Claude Code and
# Codex use their native installers (not brew) so updates land ASAP. Guarded,
# so re-runs are no-ops and it coexists with Clipboard's configure-claude on
# work machines.
[tasks.bootstrap]
description = "Install Claude Code and Codex via their native installers"
run = [
  'command -v claude >/dev/null 2>&1 || curl -fsSL https://claude.ai/install.sh | bash',
  'command -v codex >/dev/null 2>&1 || curl -fsSL https://chatgpt.com/codex/install.sh | sh',
]
