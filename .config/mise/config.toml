[tools]
node = "lts"
# Not brew: mise's brew backend only installs tap formulas whose tap
# publishes api/formula/<name>.json, which eugene1g/safehouse doesn't.
# The github backend pulls the release asset directly; bin renames the
# bare script to `safehouse`, the command the brew formula installed.
# (ubi can't rename bare single-file assets — it keeps safehouse.sh.)
# Pinned to match the employer bootstrap's configure-security-tools,
# which rewrites any other declared version to its pin; keeping parity
# means it skips instead of dirtying this file. Bump both together.
"github:eugene1g/agent-safehouse" = { version = "0.11.0", asset_pattern = "safehouse.sh", bin = "safehouse" }

[settings]
idiomatic_version_file_enable_tools = ["node"]

[bootstrap.packages]
"brew:agent-browser" = "latest"
"brew:awscli" = "latest"
"brew:colima" = "latest"
"brew:coreutils" = "latest"
"brew:docker" = "latest"
"brew:docker-compose" = "latest"
"brew:eza" = "latest"
"brew:fzf" = "latest"
"brew:gh" = "latest"
"brew:git" = "latest"
"brew:git-delta" = "latest"
"brew:gnupg" = "latest"
"brew:helix" = "latest"
"brew:jq" = "latest"
"brew:mole" = "latest"
"brew:pinentry-mac" = "latest"
"brew:ripgrep" = "latest"
"brew:rtk" = "latest"
"brew:shellcheck" = "latest"
"brew:sqlite" = "latest"
"brew:starship" = "latest"
"brew:typescript-language-server" = "latest"
"brew:watchman" = "latest"
"brew:zoxide" = "latest"
# Not manageable by mise's brew backend — install manually (or via real
# Homebrew if you install it):
#   backblaze       cask uses an `installer` artifact mise rejects
#   cotypist        not in the App Store or Homebrew (direct download)
#   little-snitch   cask exists but needs system-extension approval anyway
#   raycast         extension-less download URL: mise saves the dmg as
#                   `download`, detects only zip by magic bytes, and fails
#                   with "app artifact 'Raycast.app' was not found"
#   amphetamine     App Store; mas installs bind to whichever Apple ID the
#   nextdns         machine is signed into, which is wrong on company-owned
#                   machines — install from the App Store by hand
"brew-cask:cmux" = "latest"
"brew-cask:codexbar" = "latest"
"brew-cask:ddpm" = "latest"
"brew-cask:font-fira-code-nerd-font" = "latest"
"brew-cask:google-chrome" = "latest"
"brew-cask:obsidian" = "latest"
"brew-cask:signal" = "latest"
"brew-cask:slack" = "latest"
"brew-cask:superwhisper" = "latest"
"brew-cask:zed" = "latest"

[bootstrap.repos]
"~/dev/dotfiles" = { url = "https://github.com/therockstorm/dotfiles.git" }

# Symlinked from this repo into $HOME (mode defaults to symlink). The mise
# config itself is seeded manually first — see README.md. If a real file
# already exists at a target (e.g. a ~/.zshrc created before this runs),
# apply with `mise bootstrap --yes --force-dotfiles` to replace it.
[dotfiles]
"~/.config/mise/config.toml" = { source = "~/dev/dotfiles/.config/mise/config.toml" }
"~/.config/starship.toml" = { source = "~/dev/dotfiles/.config/starship.toml" }
"~/.gnupg/gpg-agent.conf" = { source = "~/dev/dotfiles/.gnupg/gpg-agent.conf" }
"~/.ssh/config" = { source = "~/dev/dotfiles/.ssh/config" }
"~/.gitconfig" = { source = "~/dev/dotfiles/.gitconfig" }
"~/.zshrc" = { source = "~/dev/dotfiles/.zshrc" }
"~/source" = { source = "~/dev/dotfiles/source" }
# Agent/editor config. Tools that rewrite files atomically (Claude Code and
# Zed saving settings) replace the symlink with a real file; `mise bootstrap
# status` shows the drift — re-link with `mise bootstrap --yes
# --force-dotfiles` after reconciling.
#
# NOT tracked (public repo):
#   secrets: ~/.claude/.credentials.json, ~/.config/gh/hosts.yml,
#     ~/.codex/auth.json, ~/.config/groundtruth/ (auth only),
#     ~/.config/groundcrew/op.env (op:// vault refs), ~/.dogrc
#   ~/.codex entirely: config.toml and rules/ are machine-appended state
#     (repo trust list, command-approval history) that would republish
#     internal paths and commands on every commit. Re-set the three real
#     preferences on a new machine: model, model_reasoning_effort,
#     personality.
#   work context: ~/.config/groundcrew/ and friends reference internal work
#     repos — copy by hand on work machines (see README "Migrating from an
#     old machine"). ~/.claude/hooks/rtk-rewrite.sh, the only hook
#     settings.json references, is created by `rtk init -g` in
#     [tasks.bootstrap].
"~/.claude/CLAUDE.md" = { source = "~/dev/dotfiles/.claude/CLAUDE.md" }
"~/.claude/settings.json" = { source = "~/dev/dotfiles/.claude/settings.json" }
"~/.claude/statusline.sh" = { source = "~/dev/dotfiles/.claude/statusline.sh" }
"~/.claude/docs" = { source = "~/dev/dotfiles/.claude/docs" }
"~/.config/zed/settings.json" = { source = "~/dev/dotfiles/.config/zed/settings.json" }
"~/.config/zed/keymap.json" = { source = "~/dev/dotfiles/.config/zed/keymap.json" }
"~/.config/helix/config.toml" = { source = "~/dev/dotfiles/.config/helix/config.toml" }
"~/.config/helix/languages.toml" = { source = "~/dev/dotfiles/.config/helix/languages.toml" }
"~/.config/gh/config.yml" = { source = "~/dev/dotfiles/.config/gh/config.yml" }
# 1Password secret-injection scopes for the `ops` helper (source/aliases.zsh):
# pointer files only, secrets never touch disk or the shell env. Work-vault
# scopes are NOT tracked (UUID refs, public repo) — recreate locally as
# ~/.config/op/{linear,src,status-update}.env. npm.env is written by the
# employer bootstrap; don't create it by hand.
"~/.config/op/ai.env" = { source = "~/dev/dotfiles/.config/op/ai.env" }
# Caps Lock → Escape at login (hidutil mappings don't survive reboot).
# Deliberately NOT [bootstrap.macos.launchd.agents]: mise's apply always
# runs `launchctl bootout <domain> <path>` first, and on current macOS that
# returns EIO (not "no such process") for a never-loaded service, failing
# the first apply on every fresh machine. mise copies the plist; the guarded
# launchctl load lives in [tasks.bootstrap]. Copied, not symlinked — launchd
# is unreliable with symlinked agent plists.
"~/Library/LaunchAgents/caps-to-escape.plist" = { source = "~/dev/dotfiles/.config/launchd/caps-to-escape.plist", mode = "copy" }

[bootstrap.macos.dock]
autohide = true
tilesize = 32
show_recents = false

[bootstrap.macos.finder]
preferred_view_style = "list"
show_all_files = true

[bootstrap.macos.defaults.NSGlobalDomain]
_HIHideMenuBar = true
"com.apple.mouse.scaling" = 3.0
"com.apple.trackpad.scaling" = 3.0
AppleShowAllExtensions = true
AppleKeyboardUIMode = 2
NSAutomaticPeriodSubstitutionEnabled = false

[bootstrap.macos.defaults."com.apple.finder"]
NewWindowTarget = "PfHm"

[bootstrap.macos.defaults."com.apple.dock"]
wvous-br-corner = 1
launchanim = false
show-process-indicators = false

# mise runs this task as the final step of `mise bootstrap`. Claude Code and
# Codex use their native installers (not brew) so updates land ASAP. Guarded
# where possible; rtk init is idempotent. Coexists with employer bootstraps
# on work machines.
[tasks.bootstrap]
description = "Install Claude Code + Codex, init rtk, load caps-to-escape"
run = """
set -euo pipefail
# First run happens before any login shell: claude/codex land in
# ~/.local/bin and rtk (mise's brew backend) in /opt/homebrew/bin, neither
# of which is on the invoking shell's PATH yet.
export PATH="$HOME/.local/bin:/opt/homebrew/bin:$PATH"
command -v claude >/dev/null 2>&1 || curl -fsSL https://claude.ai/install.sh | bash
# CODEX_NON_INTERACTIVE: the installer's "Start Codex now?" prompt reads
# /dev/tty and hangs the bootstrap otherwise.
command -v codex >/dev/null 2>&1 || curl -fsSL https://chatgpt.com/codex/install.sh | CODEX_NON_INTERACTIVE=1 sh
rtk init -g --hook-only
rtk init -g --codex
# Load the caps-to-escape LaunchAgent ([dotfiles] copies the plist; see the
# comment there for why mise's launchd module isn't used). RunAtLoad fires
# the remap immediately; already-loaded is the common case after first run.
# enable comes FIRST: bootstrap of a disabled label fails (with the same
# generic EIO), and enable works fine on a not-yet-loaded service.
launchctl print "gui/$(id -u)/caps-to-escape" >/dev/null 2>&1 || {
  launchctl enable "gui/$(id -u)/caps-to-escape"
  launchctl bootstrap "gui/$(id -u)" "$HOME/Library/LaunchAgents/caps-to-escape.plist"
}
"""
